<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Grid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">

  </head>
  <body>
    <div class="container">
        <div class="row">
            <div class="col-12 col-sm-5 col-md-12 col-lg-9 col-xl=6 col-xxl-2 bg-info border border-black"></div>
            <div class="col-1 col-sm-6 col-md-6 col-lg-4 col-xl-6 col-xxl-6 bg-danger border border-black"></div>
            <div class="col-10 col-sm-1 col-md-6 col-lg-4 col-xl-6 col-xxl-2 bg-info border border-black"></div>
            <div class="col-2 col-sm-5 col-md-12 col-lg-8 col-xl-6 col-xxl-1 bg-danger border border-black"></div>
            <div class="col-12 col-sm-7 col-md-6 col-lg-8 col-xl-6 col-xxl-1 bg-info border border-black"></div>
            <div class="col-12 col-sm-12 col-md-6 -col-lg-4 col-xl-6 col-xxl-1 bg-danger border border-black"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
